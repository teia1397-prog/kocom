# ============================================
# 기타 장치들
# ============================================
binary_sensor:
  - platform: uartex
    name: "Doorbell"
    icon: "mdi:doorbell"
    device_class: sound
    state:
      data: [0x30, 0xbc, 0x00, 0x60, 0x00]
      mask: [0xff, 0xff, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x01]
    state_off:
      offset: 8
      data: [0x00]
    on_press:
      - logger.log: "🔔 현관 초인종이 눌렸습니다!"
    on_release:
      - logger.log: "🔔 현관 초인종 신호 종료"

  - platform: uartex
    name: "Front Door"
    icon: "mdi:door"
    device_class: door
    state:
      data: [0x30, 0xd0, 0x00, 0x60, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x01]
    state_off:
      offset: 8
      data: [0x00]
    on_press:
      - logger.log: "🚪 현관문이 열렸습니다!"
    on_release:
      - logger.log: "🚪 현관문이 닫혔습니다!"

  - platform: uartex
    internal: true
    id: elevator_raw
    state:
      data: [0x30, 0xb0, 0x00, 0x44, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 7
      data: [0x00]   # 첫 번째 패킷 → ON
    state_off:
      offset: 7
      data: [0x01]   # 두 번째 패킷 → OFF
    on_press:        # ON 될 때마다 발동
      then:
        - lambda: 'id(elevator_text_state) = "도착";'
        - component.update: elevator_display_sensor
        - delay: 10s
        - lambda: 'id(elevator_text_state) = "대기";'
        - component.update: elevator_display_sensor

text_sensor:
  - platform: template
    name: "Elevator Status"
    id: elevator_display_sensor
    icon: mdi:elevator
    lambda: |-
      return id(elevator_text_state);

button:
  - platform: uartex
    name: "Elevator Call"
    icon: "mdi:elevator"
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x44, 0x00, 0x01, 0x03, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]

  - platform: template
    name: "Power Supply Activate"
    icon: "mdi:power-plug"
    on_press:
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x0e, 0x00, 0x01, 0x00, 0x66, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - logger.log: "전원 공급선 활성화 (일괄소등 방지 적용)"

valve:
  - platform: uartex
    name: "Gas Valve"
    id: gas_valve
    state: 
      data: [0x30, 0xd0, 0x00, 0x2c, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_open:
      offset: 7
      data: [0x01]
    state_closed:
      offset: 7
      data: [0x01]
      inverted: true
    command_close:
      data: [0x30, 0xbc, 0x00, 0x2c, 0x00, 0x01, 0x00, 0x02, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_update: 
      data: [0x30, 0xbc, 0x00, 0x2c, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 198min

switch:
  - platform: template
    name: "All Lights Control"
    icon: "mdi:lightbulb-group"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    id: all_lights_control
    turn_on_action:
      - logger.log: "일괄 복구 실행 중..."
      - uartex.write:
          data: [0x30, 0x9c, 0x00, 0x0e, 0xff, 0x01, 0x00, 0x66, 0xff, 0xff, 0xff, 0xff, 0xff, 0xff, 0xff, 0xff]
      - logger.log: "일괄 복구 완료 - 이전 조명 상태로 복원"
    turn_off_action:
      - logger.log: "일괄소등 실행 중..."
      - uartex.write:
          data: [0x30, 0x9c, 0x00, 0x0e, 0xff, 0x01, 0x00, 0x65, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - logger.log: "일괄소등 완료 - 모든 조명 꺼짐"

