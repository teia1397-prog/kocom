uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source: github://eigger/espcomponents@latest
    components: [uartex]
    refresh: always
#    
uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

esphome:
  on_boot:
    priority: -100
    then:
      - delay: 10s
      - logger.log: "코콤 시스템 초기화 완료"
      - delay: 5s
      - component.update: master_room_heater
      - delay: 5s
      - component.update: room2_heater
      - delay: 5s
      - component.update: room3_heater
      - delay: 5s
      - component.update: Alpha_room_heater
      - delay: 5s
      - component.update: living_room_heater
      - delay: 5s
      - component.update: gas_valve
      - delay: 5s
      - component.update: room1_outlet_1
      - delay: 5s
      - component.update: room2_outlet_1
      - delay: 5s
      - component.update: room3_outlet_1
      - delay: 5s
      - component.update: room4_outlet_1
      - delay: 5s
      - component.update: room5_outlet_1
      - delay: 5s
      - component.update: room0_outlet_1
      - logger.log: "초기 상태 조회 완료"

globals:
  - id: elevator_text_state
    type: std::string
    initial_value: '"대기"'
  # elevator_triggered 제거해도 됨

