uart:
id: uart_bus
baud_rate: 9600
data_bits: 8
parity: NONE
stop_bits: 1
rx_pin: GPIO01
tx_pin: GPIO02
debug:
direction: BOTH
dummy_receiver: false
after:
delimiter: [0x0D, 0x0D]
sequence:
- lambda: |-
         ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
           direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
           format_hex_pretty(bytes).c_str());

external_components:
- source:
type: git
url: https://github.com/eigger/espcomponents
ref: master
components: [uartex]
refresh: always

uartex:
rx_timeout: 10ms
tx_delay: 100ms
tx_timeout: 1000ms
tx_retry_cnt: 1
rx_header: [0xAA, 0x55]
rx_footer: [0x0D, 0x0D]
tx_header: [0xAA, 0x55]
tx_footer: [0x0D, 0x0D]
rx_checksum: add_no_header
tx_checksum: add_no_header
version:
disabled: False
error:
disabled: False
log:
disabled: False

logger:
level: DEBUG
logs:
uart_debug: DEBUG
uartex: DEBUG

# ─────────────────────────────────────────────
# HA 대시보드 카드 구성 (참고):
# type: entities
# title: 전열교환기
# entities:
#   - entity: select.erv_mode    ← 끄기/전열/바이패스/자동/취침
#   - entity: select.erv_speed   ← 약/중/강
# ─────────────────────────────────────────────
fan:
  - platform: uartex
    name: "ERV"
    id: erv_fan
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x11]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      int idx = (int)x;
      uint8_t speed_map[] = {0x00, 0x40, 0x80, 0xc0};
      uint8_t spd = (idx >= 1 && idx <= 3) ? speed_map[idx] : 0x40;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s

select:
  # ─────────────────────────────────────────────
  # 모드 선택
  # ─────────────────────────────────────────────
- platform: template
name: "ERV Mode"
id: erv_mode
icon: "mdi:air-filter"
optimistic: true
restore_value: true
    initial_option: "끄기"
    initial_option: "바이패스"
options:
      - "끄기"
      - "전열"
- "바이패스"
- "자동"
- "취침"
on_value:
      - if:
          condition:
            lambda: 'return x == "끄기";'
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
            - logger.log: "ERV OFF"
      - if:
          condition:
            lambda: 'return x == "전열";'
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
            - logger.log: "Mode: 전열"
- if:
condition:
lambda: 'return x == "바이패스";'
then:
- uartex.write:
data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
ack: [0x30, 0xdc]
- logger.log: "Mode: 바이패스"
- if:
condition:
lambda: 'return x == "자동";'
then:
- uartex.write:
data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
ack: [0x30, 0xdc]
- logger.log: "Mode: 자동"
- if:
condition:
lambda: 'return x == "취침";'
then:
- uartex.write:
data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
ack: [0x30, 0xdc]
- logger.log: "Mode: 취침"

  # ─────────────────────────────────────────────
  # 풍량 선택
  # 모드가 자동/취침/끄기일 때는 전열(0x01)로 전송
  # ─────────────────────────────────────────────
  - platform: template
    name: "ERV Speed"
    id: erv_speed
    icon: "mdi:fan"
    optimistic: true
    restore_value: true
    initial_option: "중"
    options:
      - "약"
      - "중"
      - "강"
    on_value:
      # 자동/취침/끄기 모드에서는 풍량 변경 무시
      - if:
          condition:
            lambda: |-
              auto mode = id(erv_mode).state;
              return (mode == "끄기" || mode == "자동" || mode == "취침");
          then:
            - logger.log: "Speed change ignored (auto/sleep/off mode)"
      - if:
          condition:
            lambda: |-
              auto mode = id(erv_mode).state;
              return x == "약" && mode != "끄기" && mode != "자동" && mode != "취침";
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
            - logger.log: "Speed: 약"
      - if:
          condition:
            lambda: |-
              auto mode = id(erv_mode).state;
              return x == "중" && mode != "끄기" && mode != "자동" && mode != "취침";
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
            - logger.log: "Speed: 중"
      - if:
          condition:
            lambda: |-
              auto mode = id(erv_mode).state;
              return x == "강" && mode != "끄기" && mode != "자동" && mode != "취침";
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0xc0, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
            - logger.log: "Speed: 강"
