uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# 실제 테스트로 확정된 패킷 구조
#
# offset 8  = 상태/전원 관련 (0x11 고정 사용)
# offset 9  = 모드 (✅ 실제 테스트로 확인):
#   0x02 = 자동(auto)      ✅
#   0x05 = 취침(sleep)     ✅
#   0x01 = 바이패스(bypass) ✅ (테스트에서 자동처럼 보였지만 별도 모드)
#   나머지(0x03,0x04,0x08) → 자동으로 fall-through 되는 값들
#
# offset 12 = 전원: 0x40=ON ✅ / 0x00=OFF ✅
#
# 풍량: 아직 미발견 → 월패드 RX 패킷 캡처 필요
# ═══════════════════════════════════════════════════════════════

switch:
  # ─────────────────────────────────────────────
  # 전원 ON/OFF ✅
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Power"
    id: erv_power
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 12
      data: [0x40]
    state_off:
      offset: 12
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "ERV Power ON"
    on_turn_off:
      - logger.log: "ERV Power OFF"

  # ─────────────────────────────────────────────
  # 모드 선택 ✅ 실제 테스트 확인
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Mode Auto"
    id: erv_mode_auto
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x02]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      # offset9=0x02 → 자동모드 ✅
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Auto ✅"
    on_turn_off:
      - logger.log: "Mode Auto OFF"

  - platform: uartex
    name: "ERV Mode Sleep"
    id: erv_mode_sleep
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x05]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      # offset9=0x05 → 취침모드 ✅
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Sleep ✅"
    on_turn_off:
      - logger.log: "Mode Sleep OFF"

  - platform: uartex
    name: "ERV Mode Bypass"
    id: erv_mode_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x01]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      # offset9=0x01 → 바이패스 ✅
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Bypass ✅"
    on_turn_off:
      - logger.log: "Mode Bypass OFF"

  # ─────────────────────────────────────────────
  # 🔍 풍량 탐색용
  # offset 8 상위nibble을 바꿔가며 풍량 찾기
  # 현재까지 offset 9가 모드로 확인됨
  # 풍량은 offset 8이나 다른 위치에 있을 가능성
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Probe Fan A"
    id: erv_probe_fan_a
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x41]
    state_off:
      offset: 8
      data: [0x00]
    command_on:
      # offset8 상위nibble=0x4 시도 (풍량1단 추정)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x41, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe Fan A: offset8=0x41"

  - platform: uartex
    name: "ERV Probe Fan B"
    id: erv_probe_fan_b
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x81]
    state_off:
      offset: 8
      data: [0x00]
    command_on:
      # offset8 상위nibble=0x8 시도 (풍량2단 추정)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x81, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe Fan B: offset8=0x81"

  - platform: uartex
    name: "ERV Probe Fan C"
    id: erv_probe_fan_c
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0xc1]
    state_off:
      offset: 8
      data: [0x00]
    command_on:
      # offset8 상위nibble=0xC 시도 (풍량3단 추정)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0xc1, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe Fan C: offset8=0xC1"
