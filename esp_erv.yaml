uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]

uartex:
  rx_timeout: 200ms  # 충돌 방지를 위해 응답 대기 시간을 늘림
  tx_delay: 300ms   # 월패드 신호 사이의 틈을 타기 위해 간격 조정
  tx_timeout: 1000ms
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header

fan:
  # 전열모드
  - platform: uartex
    name: "ERV Heat Exchange"
    id: erv_heat
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on: {offset: 9, data: [0x01]}
    state_off: {offset: 8, data: [0x00]}
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    # 켜질 때 무조건 1단(0x40) 명령 전송
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t spd = 0x40; // 기본 1단
      if (x == 2) spd = 0x80;
      else if (x == 3) spd = 0xc0;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    on_turn_on:
      - fan.turn_off: erv_bypass
      - switch.turn_off: erv_auto
      - switch.turn_off: erv_sleep

  # 바이패스모드
  - platform: uartex
    name: "ERV Bypass"
    id: erv_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on: {offset: 9, data: [0x03]}
    state_off: {offset: 8, data: [0x00]}
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t spd = 0x40;
      if (x == 2) spd = 0x80;
      else if (x == 3) spd = 0xc0;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    on_turn_on:
      - fan.turn_off: erv_heat
      - switch.turn_off: erv_auto
      - switch.turn_off: erv_sleep

switch:
  - platform: uartex
    name: "ERV Auto"
    id: erv_auto
    state: { data: [0x30, 0xdc, 0x00, 0x48, 0x00], mask: [0xff, 0xf0, 0xff, 0xff, 0xff], offset: 9, data_on: [0x02], data_off: [0x00] }
    command_on: { data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00], ack: [0x30, 0xdc] }
    command_off: { data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00], ack: [0x30, 0xdc] }

  - platform: uartex
    name: "ERV Sleep"
    id: erv_sleep
    state: { data: [0x30, 0xdc, 0x00, 0x48, 0x00], mask: [0xff, 0xf0, 0xff, 0xff, 0xff], offset: 9, data_on: [0x05], data_off: [0x00] }
    command_on: { data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00], ack: [0x30, 0xdc] }
    command_off: { data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00], ack: [0x30, 0xdc] }

  # 강력한 전원 끄기 버튼
  - platform: template
    name: "ERV Force Stop"
    id: erv_power_off
    icon: "mdi:power"
    turn_on_action:
      - repeat:
          count: 3
          then:
            - uart.write: [0xAA, 0x55, 0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x35, 0x0D, 0x0D]
            - delay: 200ms
      - switch.turn_off: erv_power_off
