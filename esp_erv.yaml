# esp_erv.yaml - ERV 전원 제어 (전원 스위치만)
# NASA CRC: pkt[3:]부터 계산, hi 먼저 lo 나중 저장

uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: true
    after:
      delimiter: [0x34]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "%s: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG

globals:
  - id: g_seq
    type: int
    restore_value: false
    initial_value: '0'

switch:
  - platform: template
    name: "ERV Power"
    id: erv_power
    icon: mdi:power
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          // ON: 41.49=01, 41.47=02, 40.06=00, 40.11=00, 40.60=00
          uint8_t pkt[] = {
            0x32, 0x00, 0x1D,
            0x6A, 0xEE, 0xFF, 0x35, 0x01, 0x00,
            0xC0, 0x13,
            (uint8_t)(id(g_seq) & 0xFF),
            0x05,
            0x41, 0x49, 0x01,
            0x41, 0x47, 0x02,
            0x40, 0x06, 0x00,
            0x40, 0x11, 0x00,
            0x40, 0x60, 0x00,
            0x00, 0x00, 0x34
          };
          uint16_t crc = 0;
          for (int ci = 3; ci < (int)sizeof(pkt) - 3; ci++) {
            crc = ((crc >> 8) | ((crc & 0xFF) << 8)) & 0xFFFF;
            crc ^= pkt[ci];
            crc ^= (crc & 0xFF) >> 4;
            crc ^= (crc << 12) & 0xFFFF;
            crc ^= ((crc & 0xFF) << 5) & 0xFFFF;
          }
          pkt[sizeof(pkt)-3] = (crc >> 8) & 0xFF;  // hi 먼저
          pkt[sizeof(pkt)-2] = crc & 0xFF;           // lo 나중
          id(uart_bus).write_array(pkt, sizeof(pkt));
          id(g_seq) = (id(g_seq) + 1) & 0xFF;
          ESP_LOGI("erv", "ON sent CRC=%02X %02X", (crc>>8)&0xFF, crc&0xFF);
    turn_off_action:
      - lambda: |-
          // OFF: 41.49=00
          uint8_t pkt[] = {
            0x32, 0x00, 0x11,
            0x6A, 0xEE, 0xFF, 0x35, 0x01, 0x00,
            0xC0, 0x13,
            (uint8_t)(id(g_seq) & 0xFF),
            0x01,
            0x41, 0x49, 0x00,
            0x00, 0x00, 0x34
          };
          uint16_t crc = 0;
          for (int ci = 3; ci < (int)sizeof(pkt) - 3; ci++) {
            crc = ((crc >> 8) | ((crc & 0xFF) << 8)) & 0xFFFF;
            crc ^= pkt[ci];
            crc ^= (crc & 0xFF) >> 4;
            crc ^= (crc << 12) & 0xFFFF;
            crc ^= ((crc & 0xFF) << 5) & 0xFFFF;
          }
          pkt[sizeof(pkt)-3] = (crc >> 8) & 0xFF;
          pkt[sizeof(pkt)-2] = crc & 0xFF;
          id(uart_bus).write_array(pkt, sizeof(pkt));
          id(g_seq) = (id(g_seq) + 1) & 0xFF;
          ESP_LOGI("erv", "OFF sent CRC=%02X %02X", (crc>>8)&0xFF, crc&0xFF);
