# USB 연결 및 네트워크 로그 확인용
logger:
  level: DEBUG

uart:
  id: uart_bus
  baud_rate: 9600
  rx_pin: GPIO01
  tx_pin: GPIO02
  parity: NONE
  stop_bits: 1
  debug:
    direction: BOTH
    dummy_receiver: true
    sequence:
      - lambda: |-
          ESP_LOGI("RS485_RAW", "%s: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX", 
            format_hex_pretty(bytes).c_str());

# HA 스위치 설정
switch:
  - platform: template
    name: "Samsung ERV Power"
    id: erv_power_switch
    icon: "mdi:fan"
    # 로그에서 추출한 온/오프 패킷 적용
    turn_on_action:
      - uart.write: [0x32, 0x00, 0x11, 0x10, 0x01, 0x00, 0xB0, 0xFF, 0xFF, 0xC0, 0x14, 0x30, 0x01, 0x20, 0x0F, 0x00, 0xC2, 0x8E, 0x34]
    turn_off_action:
      - uart.write: [0x32, 0x00, 0x3B, 0x30, 0x01, 0x00, 0xB3, 0x01, 0x1F, 0xC0, 0x14, 0xC0, 0x0D, 0x40, 0x03, 0x00, 0x40, 0x04, 0x01, 0x40, 0x08, 0xFF, 0x40, 0x27, 0x00, 0x02, 0x02, 0x00, 0x00, 0x42, 0x03, 0x7F, 0xFF, 0x40, 0xB7, 0xFF, 0x42, 0xD1, 0xFF, 0xFF, 0x42, 0xD2, 0xFF, 0xFF, 0x42, 0xD3, 0xFF, 0xFF, 0x42, 0x1B, 0x7F, 0xFF, 0x40, 0x3A, 0xFF, 0x41, 0x2D, 0xFF, 0x1B, 0x8D, 0x34]

# 버퍼 비우기 루틴
interval:
  - interval: 1s
    then:
      - lambda: |-
          while (id(uart_bus).available()) {
            uint8_t b;
            id(uart_bus).read_byte(&b);
          }
