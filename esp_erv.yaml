uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# 스캔 코드 참조 결과 분석
#
# 스캔 코드의 실제 ON 패킷:
#   [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
#   offset 8  = 0x11 (전열 ON)
#   offset 9  = 0x01 (모드/풍량)
#   offset 12 = 0x00 (NOT 0x40 - 기존 가정 틀렸음!)
#
# 스캔 코드의 OFF 패킷:
#   [0x30, 0xbc, 0x00, 0x48, 0x05, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
#   offset 8  = 0x00 (OFF)
#   offset 9  = 0x01
#
# 결론:
#   offset 12 = 0x00 (항상)
#   ON/OFF = offset 8 상위nibble (0x1X=ON, 0x0X=OFF)
#   모드   = offset 9
#     0x01 = 바이패스   ✅
#     0x02 = 자동       ✅
#     0x05 = 취침       ✅
#   풍량 = 월패드가 내부적으로 기억 (별도 패킷 없을 가능성 높음)
# ═══════════════════════════════════════════════════════════════

switch:
  # ─────────────────────────────────────────────
  # 전원 ON/OFF
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Power"
    id: erv_power
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x10]
      mask: [0xf0]
    state_off:
      offset: 8
      data: [0x00]
      mask: [0xf0]
    command_on:
      # 스캔코드 구조 그대로 적용 (offset12=0x00)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "ERV Power ON"
    on_turn_off:
      - logger.log: "ERV Power OFF"

  # ─────────────────────────────────────────────
  # 모드 선택 ✅ 확정
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Mode Auto"
    id: erv_mode_auto
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x02]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Auto ✅"

  - platform: uartex
    name: "ERV Mode Bypass"
    id: erv_mode_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x01]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Bypass ✅"

  - platform: uartex
    name: "ERV Mode Sleep"
    id: erv_mode_sleep
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x05]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Sleep ✅"

  # ─────────────────────────────────────────────
  # 🔍 풍량 탐색
  # 스캔코드 보면 풍량 별도 패킷이 없음
  # offset 8 하위nibble 또는 offset 10~11에 있을 수 있음
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Fan Low"
    id: erv_fan_low
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 10
      data: [0x40]
    state_off:
      offset: 10
      data: [0x00]
    command_on:
      # offset10=0x40 (low) 시도
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Fan Low probe (offset10=0x40)"

  - platform: uartex
    name: "ERV Fan Medium"
    id: erv_fan_medium
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 10
      data: [0x80]
    state_off:
      offset: 10
      data: [0x00]
    command_on:
      # offset10=0x80 (medium) 시도
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Fan Medium probe (offset10=0x80)"

  - platform: uartex
    name: "ERV Fan High"
    id: erv_fan_high
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 10
      data: [0xc0]
    state_off:
      offset: 10
      data: [0x00]
    command_on:
      # offset10=0xC0 (high) 시도
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0xc0, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Fan High probe (offset10=0xC0)"
