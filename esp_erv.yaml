uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());
          if (direction == uart::UART_DIRECTION_RX) {
            for (int i = 0; i + 7 < (int)bytes.size(); i++) {
              if (bytes[i]   == 0x32 &&
                  bytes[i+2] == 0x0E &&
                  bytes[i+3] == 0xD0 &&
                  bytes[i+5] == 0xB1) {
                bool linked = (bytes[i+7] == 0x01);
                ESP_LOGI("uart_debug", "B1 found at i=%d, linked=%d", i, linked);
                id(airpurifier_linked).publish_state(linked);
                break;
              }
            }
          }

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]

uartex:
  rx_timeout: 200ms
  tx_delay: 300ms
  tx_timeout: 1000ms
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

globals:
  - id: erv_timer_remaining
    type: int
    restore_value: false
    initial_value: '0'
  - id: erv_timer_hours
    type: int
    restore_value: false
    initial_value: '0'
  # ERV 실제 동작 상태 직접 추적 (uartex fan.is_on 신뢰 불가)
  - id: erv_is_running
    type: bool
    restore_value: false
    initial_value: 'false'

binary_sensor:
  - platform: template
    name: "공기청정기 연동"
    id: airpurifier_linked
    device_class: running

sensor:
  - platform: template
    name: "ERV 예약 남은 시간"
    id: erv_timer_display
    icon: "mdi:timer-outline"
    unit_of_measurement: "분"
    accuracy_decimals: 0
    lambda: |-
      return (float)(id(erv_timer_remaining) / 60);
    update_interval: 30s

select:
  - platform: template
    name: "ERV 예약 끄기"
    id: erv_timer_select
    icon: "mdi:timer"
    options:
      - "끄기"
      - "1시간"
      - "2시간"
      - "3시간"
      - "4시간"
      - "5시간"
      - "6시간"
      - "7시간"
      - "8시간"
      - "9시간"
      - "10시간"
      - "11시간"
      - "12시간"
    initial_option: "끄기"
    optimistic: true
    set_action:
      - lambda: |-
          // 레퍼런스로 받아서 FixedVector 복사 오류 회피
          int idx = 0;
          const auto &opts = id(erv_timer_select).traits.get_options();
          for (int i = 0; i < (int)opts.size(); i++) {
            if (std::string(opts[i]) == x) { idx = i; break; }
          }
          id(erv_timer_hours) = idx;
          id(erv_timer_remaining) = idx * 3600;
          ESP_LOGI("erv_timer", "Timer set: idx=%d, remaining=%d sec", idx, idx * 3600);

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(erv_timer_remaining) > 0) {
            id(erv_timer_remaining) -= 1;
            if (id(erv_timer_remaining) == 0) {
              uint8_t cmd[] = {0xAA, 0x55, 0x30, 0xBC, 0x00, 0x48, 0x00, 0x01,
                               0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
                               0x00, 0x00, 0x35, 0x0D, 0x0D};
              for (int i = 0; i < 5; i++) {
                id(uart_bus).write_array(cmd, sizeof(cmd));
                delay(100);
              }
              id(erv_heat).turn_off();
              id(erv_bypass).turn_off();
              id(erv_auto).turn_off();
              id(erv_sleep).turn_off();
              id(erv_timer_select).publish_state("끄기");
            }
          }

fan:
  - platform: uartex
    name: "ERV Heat Exchange"
    id: erv_heat
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on: {offset: 9, data: [0x01]}
    state_off: {offset: 8, data: [0x00]}
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_off: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_speed: !lambda |-
      if (id(airpurifier_linked).state) return {};
      uint8_t spd = 0x40;
      if (x == 2) spd = 0x80;
      else if (x == 3) spd = 0xc0;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    on_turn_on:
      - lambda: 'id(erv_is_running) = true;'
      - switch.turn_off: erv_auto
      - switch.turn_off: erv_sleep
      - fan.turn_off: erv_bypass
    on_turn_off:
      - lambda: |-
          if (!id(erv_bypass).state && !id(erv_auto).state && !id(erv_sleep).state)
            id(erv_is_running) = false;

  - platform: uartex
    name: "ERV Bypass"
    id: erv_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on: {offset: 9, data: [0x03]}
    state_off: {offset: 8, data: [0x00]}
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_off: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_speed: !lambda |-
      if (id(airpurifier_linked).state) return {};
      uint8_t spd = 0x40;
      if (x == 2) spd = 0x80;
      else if (x == 3) spd = 0xc0;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    on_turn_on:
      - lambda: 'id(erv_is_running) = true;'
      - switch.turn_off: erv_auto
      - switch.turn_off: erv_sleep
      - fan.turn_off: erv_heat
    on_turn_off:
      - lambda: |-
          if (!id(erv_heat).state && !id(erv_auto).state && !id(erv_sleep).state)
            id(erv_is_running) = false;

switch:
  - platform: uartex
    name: "ERV Auto"
    id: erv_auto
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on: {offset: 9, data: [0x02]}
    state_off: {offset: 8, data: [0x00]}
    command_on: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_off: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    on_turn_on:
      - lambda: 'id(erv_is_running) = true;'
      - fan.turn_off: erv_heat
      - fan.turn_off: erv_bypass
      - switch.turn_off: erv_sleep
    on_turn_off:
      - lambda: |-
          if (!id(erv_heat).state && !id(erv_bypass).state && !id(erv_sleep).state)
            id(erv_is_running) = false;

  - platform: uartex
    name: "ERV Sleep"
    id: erv_sleep
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on: {offset: 9, data: [0x05]}
    state_off: {offset: 8, data: [0x00]}
    command_on: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_off: !lambda |-
      if (id(airpurifier_linked).state) return {};
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    on_turn_on:
      - lambda: 'id(erv_is_running) = true;'
      - fan.turn_off: erv_heat
      - fan.turn_off: erv_bypass
      - switch.turn_off: erv_auto
    on_turn_off:
      - lambda: |-
          if (!id(erv_heat).state && !id(erv_bypass).state && !id(erv_auto).state)
            id(erv_is_running) = false;

  - platform: template
    name: "ERV Force Stop"
    id: erv_power_off
    icon: "mdi:power"
    optimistic: false
    lambda: |-
      return false;
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(erv_is_running);'
          then:
            - repeat:
                count: 5
                then:
                  - uart.write: [0xAA, 0x55, 0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x35, 0x0D, 0x0D]
                  - delay: 100ms
            - lambda: 'id(erv_is_running) = false;'
            - fan.turn_off: erv_heat
            - fan.turn_off: erv_bypass
            - switch.turn_off: erv_auto
            - switch.turn_off: erv_sleep
          else:
            - logger.log: "ERV already off, skip"
    turn_off_action:
      - logger.log: "ERV Force Stop reset"
