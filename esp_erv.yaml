uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

globals:
  - id: vent_mode
    type: uint8_t
    restore_value: true
    initial_value: '0x01'

switch:
  # ─────────────────────────────
  # 전열모드
  # turn_off_action: 아무것도 안 함 → 토글 OFF 불가
  # ─────────────────────────────
  - platform: template
    name: "Ventilation Heat"
    id: vent_heat
    icon: "mdi:heat-wave"
    unique_id: "esp_erv_heat_2024"
    optimistic: true
    turn_on_action:
      - lambda: 'id(vent_mode) = 0x01;'
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - switch.turn_off: vent_bypass
      - switch.turn_off: vent_auto
      - switch.turn_off: vent_sleep
      - select.set:
          id: vent_speed
          option: "약"
      - logger.log: "Mode: Heat Exchange"
    turn_off_action:
      # 이미 켜진 스위치는 OFF 안 됨 (종료버튼으로만 끄기)
      - switch.turn_on: vent_heat

  # ─────────────────────────────
  # 바이패스모드
  # ─────────────────────────────
  - platform: template
    name: "Ventilation Bypass"
    id: vent_bypass
    icon: "mdi:air-filter"
    unique_id: "esp_erv_bypass_2024"
    optimistic: true
    turn_on_action:
      - lambda: 'id(vent_mode) = 0x03;'
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - switch.turn_off: vent_heat
      - switch.turn_off: vent_auto
      - switch.turn_off: vent_sleep
      - select.set:
          id: vent_speed
          option: "약"
      - logger.log: "Mode: Bypass"
    turn_off_action:
      - switch.turn_on: vent_bypass

  # ─────────────────────────────
  # 자동모드
  # ─────────────────────────────
  - platform: template
    name: "Ventilation Auto"
    id: vent_auto
    icon: "mdi:refresh-auto"
    unique_id: "esp_erv_auto_2024"
    optimistic: true
    turn_on_action:
      - lambda: 'id(vent_mode) = 0x02;'
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - switch.turn_off: vent_heat
      - switch.turn_off: vent_bypass
      - switch.turn_off: vent_sleep
      - logger.log: "Mode: Auto"
    turn_off_action:
      - switch.turn_on: vent_auto

  # ─────────────────────────────
  # 취침모드
  # ─────────────────────────────
  - platform: template
    name: "Ventilation Sleep"
    id: vent_sleep
    icon: "mdi:sleep"
    unique_id: "esp_erv_sleep_2024"
    optimistic: true
    turn_on_action:
      - lambda: 'id(vent_mode) = 0x05;'
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - switch.turn_off: vent_heat
      - switch.turn_off: vent_bypass
      - switch.turn_off: vent_auto
      - logger.log: "Mode: Sleep"
    turn_off_action:
      - switch.turn_on: vent_sleep


  # ─────────────────────────────
  # 종료 버튼 (momentary switch)
  # 누르면 켜졌다가 1초 후 자동 OFF → 버튼처럼 동작
  # ─────────────────────────────
  - platform: template
    name: "Ventilation Power Off"
    id: vent_off
    icon: "mdi:power"
    unique_id: "esp_erv_off_2024"
    optimistic: true
    turn_on_action:
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - lambda: 'id(vent_mode) = 0x00;'
      - switch.turn_off: vent_heat
      - switch.turn_off: vent_bypass
      - switch.turn_off: vent_auto
      - switch.turn_off: vent_sleep
      - logger.log: "ERV OFF"
      - delay: 1s
      - switch.turn_off: vent_off
    turn_off_action:
      - logger.log: "ERV Off reset"

select:
  # ─────────────────────────────
  # 풍량 선택 (전열/바이패스에서만 유효)
  # ─────────────────────────────
  - platform: template
    name: "Ventilation Speed"
    id: vent_speed
    icon: "mdi:fan"
    optimistic: true
    restore_value: true
    initial_option: "약"
    options:
      - "약"
      - "중"
      - "강"
    on_value:
      - if:
          condition:
            # 자동/취침/꺼짐 상태면 무시
            lambda: 'return id(vent_mode) == 0x02 || id(vent_mode) == 0x05 || id(vent_mode) == 0x00;'
          then:
            - logger.log: "Speed ignored (auto/sleep/off)"
      - if:
          condition:
            lambda: 'return x == "약" && id(vent_mode) != 0x02 && id(vent_mode) != 0x05 && id(vent_mode) != 0x00;'
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
      - if:
          condition:
            lambda: 'return x == "중" && id(vent_mode) != 0x02 && id(vent_mode) != 0x05 && id(vent_mode) != 0x00;'
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
      - if:
          condition:
            lambda: 'return x == "강" && id(vent_mode) != 0x02 && id(vent_mode) != 0x05 && id(vent_mode) != 0x00;'
          then:
            - uartex.write:
                data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0xc0, 0x00, 0x00, 0x00, 0x00, 0x00]
                ack: [0x30, 0xdc]
