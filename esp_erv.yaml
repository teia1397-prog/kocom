uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: true
    after:
      delimiter: [0x34] # 제어기 패킷 종료 문자에 맞춰 조정 필요
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "%s: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

# HA에 표시될 센서 및 제어 버튼
sensor:
  - platform: template
    name: "ERV Current Speed"
    id: erv_speed
    unit_of_measurement: "Step"

switch:
  - platform: template
    name: "Samsung Air Purifier ERV Link"
    id: erv_link_switch
    turn_on_action:
      - uart.write: [0xAA, 0x55, 0x01, 0x01, 0x01, 0x00, 0x03] # 실제 ON 패킷으로 교체
    turn_off_action:
      - uart.write: [0xAA, 0x55, 0x01, 0x01, 0x00, 0x00, 0x02] # 실제 OFF 패킷으로 교체

# 핵심: 수신 데이터를 처리하는 루틴을 인터벌로 통합
interval:
  - interval: 100ms
    then:
      - lambda: |-
          static std::vector<uint8_t> buffer;
          while (id(uart_bus).available()) {
            uint8_t b;
            id(uart_bus).read_byte(&b);
            buffer.push_back(b);

            // 패킷 분석 (예: 삼성/코콤 프로토콜 규격이 보통 7~10바이트)
            if (buffer.size() >= 7) {
              // 헤더 확인 (예: 0xAA 0x55 로 시작한다고 가정)
              if (buffer[0] == 0xAA && buffer[1] == 0x55) {
                // [4]번 바이트가 풍량 데이터라면 센서 업데이트
                id(erv_speed).publish_state(buffer[4]);
                ESP_LOGD("custom", "ERV Speed Updated: %d", buffer[4]);
                buffer.clear();
              } else {
                buffer.erase(buffer.begin()); // 헤더 찾을때까지 밀기
              }
            }
            if (buffer.size() > 20) buffer.clear(); // 버퍼 넘침 방지
          }

globals:
  - id: g_seq
    type: int
    restore_value: false
    initial_value: '0'
