# ============================================================
# esp_erv.yaml - 전열교환기 + 천장형 공기청정기 제어
# ============================================================
uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x34]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "%s: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());
external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always
uartex:
  rx_timeout: 200ms
  tx_delay: 300ms
  tx_timeout: 200ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG
globals:
  - id: g_power
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: g_mode
    type: int
    restore_value: false
    initial_value: '0'
binary_sensor:
  - platform: template
    name: "Air Purifier Linked"
    id: airpurifier_linked
    device_class: running
    lambda: 'return id(g_power);'
select:
  - platform: template
    name: "ERV Mode"
    id: erv_mode
    icon: mdi:air-filter
    optimistic: true
    restore_value: false
    initial_option: "전열환기"
    options:
      - "꺼짐"
      - "스마트환기"
      - "청정"
      - "환기"
      - "전열환기"
    on_value:
      - if:
          condition:
            lambda: 'return x == "꺼짐";'
          then:
            - uartex.write:
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x01,
                       0x41, 0x49, 0x00]
            - globals.set:
                id: g_power
                value: 'false'
            - logger.log: "ERV 모드: 꺼짐"
      - if:
          condition:
            lambda: 'return x == "스마트환기";'
          then:
            - uartex.write:
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x05,
                       0x41, 0x49, 0x01,
                       0x41, 0x47, 0x02,
                       0x40, 0x06, 0x00,
                       0x40, 0x11, 0x00,
                       0x40, 0x60, 0x00]
            - globals.set:
                id: g_power
                value: 'true'
            - globals.set:
                id: g_mode
                value: '2'
            - logger.log: "ERV 모드: 스마트환기"
      - if:
          condition:
            lambda: 'return x == "청정";'
          then:
            - uartex.write:
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x06,
                       0x40, 0x07, 0x0A,
                       0x40, 0x59, 0x01,
                       0x41, 0x47, 0x02,
                       0x41, 0x48, 0x0A,
                       0x41, 0x49, 0x01,
                       0x43, 0x02, 0x00, 0x00]
            - globals.set:
                id: g_power
                value: 'true'
            - globals.set:
                id: g_mode
                value: '3'
            - logger.log: "ERV 모드: 청정"
      - if:
          condition:
            lambda: 'return x == "환기";'
          then:
            - uartex.write:
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x05,
                       0x40, 0x06, 0x00,
                       0x40, 0x11, 0x00,
                       0x40, 0x60, 0x00,
                       0x41, 0x47, 0x00,
                       0x41, 0x49, 0x01]
            - globals.set:
                id: g_power
                value: 'true'
            - globals.set:
                id: g_mode
                value: '0'
            - logger.log: "ERV 모드: 환기"
      - if:
          condition:
            lambda: 'return x == "전열환기";'
          then:
            - uartex.write:
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x05,
                       0x40, 0x06, 0x00,
                       0x40, 0x11, 0x00,
                       0x40, 0x60, 0x00,
                       0x41, 0x47, 0x01,
                       0x41, 0x49, 0x01]
            - globals.set:
                id: g_power
                value: 'true'
            - globals.set:
                id: g_mode
                value: '1'
            - logger.log: "ERV 모드: 전열환기"
  - platform: template
    name: "ERV Speed"
    id: erv_speed
    icon: mdi:fan-speed-1
    optimistic: true
    restore_value: false
    initial_option: "자동"
    options:
      - "자동"
      - "미풍"
      - "약풍"
      - "강풍"
    on_value:
      - if:
          condition:
            lambda: 'return x == "자동";'
          then:
            - uartex.write:
                # 40.06=00 (스마트환기 자동풍량)
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x02,
                       0x40, 0x06, 0x00,
                       0x40, 0x07, 0x00]
            - logger.log: "ERV 속도: 자동"
      - if:
          condition:
            lambda: 'return x == "미풍";'
          then:
            - uartex.write:
                # 40.06=01, 40.07=01
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x02,
                       0x40, 0x06, 0x01,
                       0x40, 0x07, 0x01]
            - logger.log: "ERV 속도: 미풍"
      - if:
          condition:
            lambda: 'return x == "약풍";'
          then:
            - uartex.write:
                # 40.06=02, 40.07=02
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x02,
                       0x40, 0x06, 0x02,
                       0x40, 0x07, 0x02]
            - logger.log: "ERV 속도: 약풍"
      - if:
          condition:
            lambda: 'return x == "강풍";'
          then:
            - uartex.write:
                # 40.06=03, 40.07=03
                data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x02,
                       0x40, 0x06, 0x03,
                       0x40, 0x07, 0x03]
            - logger.log: "ERV 속도: 강풍"
switch:
  - platform: template
    name: "ERV Power"
    id: erv_power
    icon: mdi:power
    optimistic: true
    restore_value: false
    turn_on_action:
      - uartex.write:
          # Power ON + 스마트환기 (기본 모드)
          data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x05,
                 0x41, 0x49, 0x01,
                 0x41, 0x47, 0x02,
                 0x40, 0x06, 0x00,
                 0x40, 0x11, 0x00,
                 0x40, 0x60, 0x00]
      - globals.set:
          id: g_power
          value: 'true'
      - logger.log: "ERV Power ON"
    turn_off_action:
      - uartex.write:
          # Power OFF
          data: [0x30, 0xBC, 0x00, 0x48, 0x00, 0x01, 0x00, 0x01,
                 0x41, 0x49, 0x00]
      - globals.set:
          id: g_power
          value: 'false'
      - logger.log: "ERV Power OFF"
