uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# 확정된 패킷 구조
# offset 8  = ON/OFF:  0x11=ON / 0x00=OFF
# offset 9  = 모드:    0x01=전열 / 0x02=자동 / 0x03=바이패스 / 0x05=취침
# offset 10 = 풍량:    0x40=약 / 0x80=중 / 0xC0=강
# ═══════════════════════════════════════════════════════════════

# 현재 모드를 저장하는 글로벌 변수
globals:
  - id: current_mode
    type: uint8_t
    restore_value: true
    initial_value: '0x01'  # 기본값: 전열모드

fan:
  # ─────────────────────────────────────────────
  # 전열교환기 메인 팬
  # 풍량 슬라이더 + 전원 ON/OFF
  # 모드는 아래 select로 선택
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV"
    id: erv_fan
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x11]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on: !lambda |-
      uint8_t mode = id(current_mode).state;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, mode, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t mode = id(current_mode).state;
      int idx = (int)x;
      uint8_t speed_map[] = {0x00, 0x40, 0x80, 0xc0};
      uint8_t spd = (idx >= 1 && idx <= 3) ? speed_map[idx] : 0x40;
      if (mode == 0x02) spd = 0x40;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, mode, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s

select:
  # ─────────────────────────────────────────────
  # 모드 선택 드롭다운
  # HA fan 카드 하단에 옵션으로 표시됨
  # 끄기 / 전열 / 바이패스 / 자동 / 취침
  # ─────────────────────────────────────────────
  - platform: template
    name: "ERV Mode"
    id: erv_mode_select
    icon: "mdi:air-filter"
    optimistic: true
    restore_value: true
    initial_option: "전열"
    options:
      - "끄기"
      - "전열"
      - "바이패스"
      - "자동"
      - "취침"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "끄기";'
            then:
              - lambda: 'id(current_mode).state = 0x01;'
              - uartex.write:
                  data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
                  ack: [0x30, 0xdc]
              - logger.log: "ERV OFF"
        - if:
            condition:
              lambda: 'return x == "전열";'
            then:
              - lambda: 'id(current_mode).state = 0x01;'
              - uartex.write:
                  data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
                  ack: [0x30, 0xdc]
              - logger.log: "Mode: 전열"
        - if:
            condition:
              lambda: 'return x == "바이패스";'
            then:
              - lambda: 'id(current_mode).state = 0x03;'
              - uartex.write:
                  data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
                  ack: [0x30, 0xdc]
              - logger.log: "Mode: 바이패스"
        - if:
            condition:
              lambda: 'return x == "자동";'
            then:
              - lambda: 'id(current_mode).state = 0x02;'
              - uartex.write:
                  data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
                  ack: [0x30, 0xdc]
              - logger.log: "Mode: 자동"
        - if:
            condition:
              lambda: 'return x == "취침";'
            then:
              - lambda: 'id(current_mode).state = 0x05;'
              - uartex.write:
                  data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
                  ack: [0x30, 0xdc]
              - logger.log: "Mode: 취침"
