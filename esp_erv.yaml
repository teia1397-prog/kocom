# 기본 설정
esphome:
  name: m5stack-erv-controller

esp32:
  board: m5stack-core-esp32 # 사용하시는 M5Stack 모델에 맞게 수정 (core2 등)

# UART 설정: 로그 확인을 위해 debug 모드 활성화
uart:
  id: uart_bus
  baud_rate: 9600
  rx_pin: GPIO01
  tx_pin: GPIO02
  parity: NONE
  stop_bits: 1
  debug:
    direction: BOTH
    dummy_receiver: true
    # 특정 구분자 없이 모든 데이터를 헥사(Hex)로 찍어서 분석하기 위함
    sequence:
      - lambda: |-
          ESP_LOGI("RS485_RAW", "%s: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX", 
            format_hex_pretty(bytes).c_str());

logger:
  level: DEBUG

# 전역 변수 (시퀀스 번호 등 관리용)
globals:
  - id: g_seq
    type: int
    restore_value: false
    initial_value: '0'

# HA에서 조작할 스위치 (패킷 값은 로그 분석 후 수정 필요)
switch:
  - platform: template
    name: "Samsung ERV Power"
    id: erv_power_switch
    icon: "mdi:fan"
    turn_on_action:
      - uart.write: [0x02, 0x01, 0x01, 0x01, 0x00, 0x00, 0x03] # 예시: 실제 패킷으로 교체 필요
    turn_off_action:
      - uart.write: [0x02, 0x01, 0x01, 0x00, 0x00, 0x00, 0x02] # 예시: 실제 패킷으로 교체 필요

# 수신 데이터 파싱 및 센서 업데이트
interval:
  - interval: 500ms
    then:
      - lambda: |-
          static std::vector<uint8_t> buffer;
          while (id(uart_bus).available()) {
            uint8_t b;
            id(uart_bus).read_byte(&b);
            buffer.push_back(b);
            
            // 패킷이 들어오면 로그에 기록 (이미 uart debug에서 처리 중)
            
            // 예시 파싱 로직 (패킷 길이가 7바이트 이상일 때)
            if (buffer.size() >= 7) {
              // 삼성/코콤 규격에 맞춰 시작 바이트(예: 0x02 또는 0xAA) 확인
              if (buffer[0] == 0x02) { 
                ESP_LOGD("Parsing", "Valid Packet Start Detected");
                // 여기에 센서 업데이트 로직 추가 가능
                buffer.clear();
              } else {
                buffer.erase(buffer.begin());
              }
            }
            if (buffer.size() > 32) buffer.clear(); // 버퍼 넘침 방지
          }

# HA에 현재 상태를 보여줄 센서 (선택 사항)
sensor:
  - platform: template
    name: "ERV Status Raw"
    id: erv_status_raw
    lambda: 'return 0;' # 파싱 로직 완성 후 연결
