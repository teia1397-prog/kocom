uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

fan:
  # ─────────────────────────────────────────────
  # 전열모드 fan
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Heat Exchange"
    id: erv_heat
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x01]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      int idx = (int)x;
      uint8_t speed_map[] = {0x00, 0x40, 0x80, 0xc0};
      uint8_t spd = (idx >= 1 && idx <= 3) ? speed_map[idx] : 0x80;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s
    on_turn_on:
      # 전열 켜지면 바이패스 UI만 OFF로 내리기 (실제 패킷 없음)
      - fan.turn_off: erv_bypass

  # ─────────────────────────────────────────────
  # 바이패스모드 fan
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Bypass"
    id: erv_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x03]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      int idx = (int)x;
      uint8_t speed_map[] = {0x00, 0x40, 0x80, 0xc0};
      uint8_t spd = (idx >= 1 && idx <= 3) ? speed_map[idx] : 0x80;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s
    on_turn_on:
      # 바이패스 켜지면 전열 UI만 OFF로 내리기 (실제 패킷 없음)
      - fan.turn_off: erv_heat

switch:
  # ─────────────────────────────────────────────
  # 자동모드 / 취침모드 (풍량 없음)
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Auto"
    id: erv_auto
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x02]
    state_off:
      offset: 8
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]

  - platform: uartex
    name: "ERV Sleep"
    id: erv_sleep
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x05]
    state_off:
      offset: 8
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
