uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════════
# 패킷 구조 (참조 코드 기반 분석)
#
# TX: AA 55 [30 BC] [00 01] [00 48] [00 00] [MODE] [01] [SPEED] [0x17] ...
#                    TYPE    DEV1    DEV2             8    9      10
#
# RX: AA 55 [30 D0] [00 48] [00 00] ...  [MODE] ... [SPEED] ...
#
# offset 8  = 모드  : 0x11=전열ON / 0x00=OFF
# offset 10 = 풍량  : 0x40=1단 / 0x80=2단 / 0xC0=3단
#
# 모드 탐색 (추정, 검증 필요):
#   0x11 = 전열모드
#   0x01 = 환기모드
#   0x21 = 바이패스모드
#   0x31 = 취침모드
# ═══════════════════════════════════════════════════════════════════

fan:
  # ───────────────────────────────────────────────────────────────
  # 메인 전열교환기 팬 (전열모드 - 검증됨)
  # 풍량 1/2/3단 슬라이더로 HA에서 한번에 제어 가능
  # ───────────────────────────────────────────────────────────────
  - platform: uartex
    name: "ERV Heat Exchange"
    id: erv_heat_exchange
    state:
      data: [0x30, 0xd0, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x11]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      # 전열모드(0x11) + 풍량2단(0x80) 기본값으로 켜기
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x01, 0x80, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t speed = ((uint8_t)x) * 0x40;
      return {{0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x01, speed, 0x17, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s

  # ───────────────────────────────────────────────────────────────
  # 환기모드 팬 (추정값 - 검증 필요)
  # offset8: 0x11→0x01 변경
  # ───────────────────────────────────────────────────────────────
  - platform: uartex
    name: "ERV Ventilation"
    id: erv_ventilation
    state:
      data: [0x30, 0xd0, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x01]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x01, 0x01, 0x80, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t speed = ((uint8_t)x) * 0x40;
      return {{0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x01, 0x01, speed, 0x17, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s

  # ───────────────────────────────────────────────────────────────
  # 바이패스모드 팬 (추정값 - 검증 필요)
  # offset8: 0x21
  # ───────────────────────────────────────────────────────────────
  - platform: uartex
    name: "ERV Bypass"
    id: erv_bypass
    state:
      data: [0x30, 0xd0, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x21]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x21, 0x01, 0x80, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t speed = ((uint8_t)x) * 0x40;
      return {{0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x21, 0x01, speed, 0x17, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s

  # ───────────────────────────────────────────────────────────────
  # 취침모드 팬 (추정값 - 검증 필요)
  # offset8: 0x31, 풍량 1단 고정
  # ───────────────────────────────────────────────────────────────
  - platform: uartex
    name: "ERV Sleep"
    id: erv_sleep
    state:
      data: [0x30, 0xd0, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x31]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      # 취침모드는 1단(0x40) 고정
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x31, 0x01, 0x40, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t speed = ((uint8_t)x) * 0x40;
      return {{0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x31, 0x01, speed, 0x17, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s
