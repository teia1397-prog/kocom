# esp_erv.yaml - 실제 캡처된 프로토콜 기반

uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: true
    after:
      delimiter: [0x34]
    sequence:
      - lambda: |-
          ESP_LOGI("uart", "%s: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

logger:
  level: DEBUG

