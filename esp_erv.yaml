uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# 실제 캡처 패킷 (AA 55 헤더/0D0D 푸터/체크섬 제외한 데이터부)
#
# RX 상태:
#   약: 30 DC 00 48 00 01 00 00 11 01 40 17 00 00 00 00
#   중: 30 DC 00 48 00 01 00 00 11 01 80 17 00 00 00 00
#   강: 30 DC 00 48 00 01 00 00 11 01 C0 17 00 00 00 00
#   꺼: 30 DC 00 48 00 01 00 00 00 01 00 17 00 00 00 00
#
# TX 제어:
#   약: 30 BC 00 01 00 48 00 00 11 01 40 17 00 00 00 00  ← DEV/ROOM 순서 다름!
#   중: 30 BC 00 01 00 48 00 00 11 01 80 17 00 00 00 00
#   강: 30 BC 00 01 00 48 00 00 11 01 C0 17 00 00 00 00
#   꺼: 30 BC 00 01 00 48 00 00 00 01 00 17 00 00 00 00
#
# TX와 RX의 바이트 2,3,4,5 순서가 반대:
#   TX: 30 BC [00 01] [00 48] ...
#   RX: 30 DC [00 48] [00 01] ...
#
# offset (uartex 헤더 제외 기준):
#   8  = 모드/전원: 0x11=ON / 0x00=OFF
#   10 = 풍량:     0x40=약 / 0x80=중 / 0xC0=강  ✅ 확정
#   11 = 0x17 고정
# ═══════════════════════════════════════════════════════════════

fan:
  - platform: uartex
    name: "ERV"
    id: erv_fan
    state:
      # RX 패킷 기준: 30 DC 00 48 00 ...
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x11]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;  // 약
      if (check_value(10, 0x80, data, len)) return 2;  // 중
      if (check_value(10, 0xc0, data, len)) return 3;  // 강
      return 0;
    command_on:
      # TX: 00 01 00 48 순서 ✅ 약풍으로 켜기
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x01, 0x40, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      // 1=약(0x40) / 2=중(0x80) / 3=강(0xC0)
      int idx = (int)x;
      uint8_t spd = (uint8_t)(idx * 0x40);
      return {{0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x01, spd, 0x17, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s

switch:
  # ─────────────────────────────────────────────
  # 모드 선택 (TX 패킷 구조 수정 적용)
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Mode Auto"
    id: erv_mode_auto
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x02]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x02, 0x80, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Auto"

  - platform: uartex
    name: "ERV Mode Bypass"
    id: erv_mode_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x03]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x03, 0x80, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Bypass"

  - platform: uartex
    name: "ERV Mode Sleep"
    id: erv_mode_sleep
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x05]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x05, 0x40, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Sleep"
