# =====================================================================
# ERV ESPHome - Template Fan + Select + Number 구조
# uartex는 인프라만, TX는 uart.write 직접 제어
# =====================================================================
# 패킷 구조 (AA 55 포함 raw):
#   [0][1]  AA 55 헤더
#   [2][3]  Type  0x30,0xBC=Send / 0x30,0xDC=ACK
#   [4][5]  Device 0x00,0x48=Fan (보낼 때) / 0x00,0x01=Wallpad (받을 때)
#   [6][7]  Room  0x00,0x01=거실
#   [8][9]  Cmd   0x00,0x00
#   [10]    Power 0x11=On / 0x00=Off
#   [11]    Mode  0x01=전열 / 0x02=자동 / 0x03=바이패스 / 0x05=수면
#   [12]    Speed 0x40=저 / 0x80=중 / 0xC0=고
#   [13~17] 패딩 0x00
#   [18]    체크섬 (byte[2]~[17] 합산 uint8)
#   [19][20] 0x0D 0x0D
# =====================================================================

uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "%s: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

          if (direction != uart::UART_DIRECTION_RX) return;

          // ── 공기청정기 연동 감지 ──
          for (int i = 0; i + 7 < (int)bytes.size(); i++) {
            if (bytes[i]   == 0x32 &&
                bytes[i+2] == 0x0E &&
                bytes[i+3] == 0xD0 &&
                bytes[i+5] == 0xB1) {
              id(airpurifier_linked).publish_state(bytes[i+7] == 0x01);
              break;
            }
          }

          // ── ERV Fan ACK 파싱 (30.DC 패킷만 처리) ──
          // raw bytes: AA 55 30 DC 00 01 00 48 00 00 [Power] [Mode] [Speed] ...
          for (int i = 0; i + 12 < (int)bytes.size(); i++) {
            if (bytes[i]   == 0xAA && bytes[i+1] == 0x55 &&
                bytes[i+2] == 0x30 && bytes[i+3] == 0xDC &&
                bytes[i+4] == 0x00 && bytes[i+5] == 0x01 &&
                bytes[i+6] == 0x00 && bytes[i+7] == 0x48) {

              // 명령 전송 후 2초간 ACK 무시 (ERV 본체 자동 모드변경 방지)
              if (millis() - id(erv_last_cmd_at) < 2000) {
                ESP_LOGI("uart_debug", "명령 안정화 대기 중 - ACK 무시 (%dms)",
                         (int)(millis() - id(erv_last_cmd_at)));
                break;
              }

              uint8_t power = bytes[i+10];
              uint8_t mode  = bytes[i+11];
              uint8_t speed = bytes[i+12];
              bool is_on = (power & 0x01);

              ESP_LOGI("uart_debug", "ERV ACK power=0x%02X mode=0x%02X speed=0x%02X on=%d",
                        power, mode, speed, is_on);

              id(erv_fan_state) = is_on;
              id(erv_updating_from_ack) = true;

              id(erv_fan).state = is_on; id(erv_fan).publish_state();

              if (speed == 0x40) { id(erv_fan_speed) = 1; id(erv_speed_number).publish_state(1); }
              else if (speed == 0x80) { id(erv_fan_speed) = 2; id(erv_speed_number).publish_state(2); }
              else if (speed == 0xC0) { id(erv_fan_speed) = 3; id(erv_speed_number).publish_state(3); }

              if (is_on) {
                if      (mode == 0x01) id(erv_mode).publish_state("전열환기");
                else if (mode == 0x02) id(erv_mode).publish_state("자동");
                else if (mode == 0x03) id(erv_mode).publish_state("바이패스");
                else if (mode == 0x05) id(erv_mode).publish_state("수면");
              }

              id(erv_updating_from_ack) = false;
              break;
            }
          }

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]

uartex:
  rx_timeout: 200ms
  tx_delay: 300ms
  tx_timeout: 1000ms
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG

globals:
  - id: erv_fan_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: erv_fan_speed
    type: int
    restore_value: false
    initial_value: '1'
  # 마지막 명령 전송 시각 (ms) → 2초간 ACK 무시로 ERV 자동 모드전환 방지
  - id: erv_last_cmd_at
    type: uint32_t
    restore_value: false
    initial_value: '0'
  # ACK 수신으로 상태 업데이트 중 → on_turn_on/off 재진입 방지
  - id: erv_updating_from_ack
    type: bool
    restore_value: false
    initial_value: 'false'

binary_sensor:
  - platform: template
    name: "공기청정기 연동"
    id: airpurifier_linked
    device_class: running

# =====================================================================
# Select - 모드 선택
# =====================================================================
select:
  - platform: template
    name: "ERV 모드"
    id: erv_mode
    icon: "mdi:air-filter"
    optimistic: true
    options:
      - "전열환기"
      - "바이패스"
      - "자동"
      - "수면"
    initial_option: "전열환기"
    set_action:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;  // ACK 업데이트 중 재진입 방지
          if (!id(erv_fan_state)) return;
          if (id(airpurifier_linked).state) return;

          uint8_t mode_byte = 0x01;
          if (x == "바이패스") mode_byte = 0x03;
          else if (x == "자동") mode_byte = 0x02;
          else if (x == "수면") mode_byte = 0x05;

          uint8_t spd = 0x40;
          if (id(erv_fan_speed) == 2) spd = 0x80;
          else if (id(erv_fan_speed) == 3) spd = 0xC0;

          uint8_t csum = (uint8_t)(0x30+0xBC+0x00+0x48+0x00+0x01+
                                   0x00+0x00+0x11+mode_byte+spd);
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x11,mode_byte,spd,
                           0x00,0x00,0x00,0x00,0x00,csum,0x0D,0x0D};
          id(erv_last_cmd_at) = millis();
          id(uart_bus).write_array(pkt, 21);
          ESP_LOGI("erv", "모드변경: 0x%02X spd=0x%02X csum=0x%02X", mode_byte, spd, csum);

# =====================================================================
# Number - 속도 (1=저 / 2=중 / 3=고)
# template fan은 속도 미지원 → number 엔티티로 분리
# =====================================================================
number:
  - platform: template
    name: "ERV 속도"
    id: erv_speed_number
    icon: "mdi:fan-speed-1"
    min_value: 1
    max_value: 3
    step: 1
    optimistic: true
    initial_value: 1
    set_action:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;  // ACK 업데이트 중 재진입 방지
          if (!id(erv_fan_state)) return;
          if (id(airpurifier_linked).state) return;

          id(erv_fan_speed) = (int)x;

          std::string mode_str = id(erv_mode).current_option();
          uint8_t mode_byte = 0x01;
          if (mode_str == "바이패스") mode_byte = 0x03;
          else if (mode_str == "자동") mode_byte = 0x02;
          else if (mode_str == "수면") mode_byte = 0x05;

          uint8_t spd = 0x40;
          if ((int)x == 2) spd = 0x80;
          else if ((int)x == 3) spd = 0xC0;

          uint8_t csum = (uint8_t)(0x30+0xBC+0x00+0x48+0x00+0x01+
                                   0x00+0x00+0x11+mode_byte+spd);
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x11,mode_byte,spd,
                           0x00,0x00,0x00,0x00,0x00,csum,0x0D,0x0D};
          id(erv_last_cmd_at) = millis();
          id(uart_bus).write_array(pkt, 21);
          ESP_LOGI("erv", "속도변경: %d spd=0x%02X csum=0x%02X", (int)x, spd, csum);

# =====================================================================
# Fan - ERV 팬 ON/OFF (template, 속도 없음)
# =====================================================================
fan:
  - platform: template
    name: "ERV 팬"
    id: erv_fan

    on_turn_on:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;  // ACK 업데이트 중 재진입 방지
          if (id(airpurifier_linked).state) {
            ESP_LOGI("erv", "공기청정기 연동 중 - ON 차단");
            id(erv_fan).state = false; id(erv_fan).publish_state();
            return;
          }

          std::string mode_str = id(erv_mode).current_option();
          uint8_t mode_byte = 0x01;
          if (mode_str == "바이패스") mode_byte = 0x03;
          else if (mode_str == "자동") mode_byte = 0x02;
          else if (mode_str == "수면") mode_byte = 0x05;

          uint8_t spd = 0x40;
          if (id(erv_fan_speed) == 2) spd = 0x80;
          else if (id(erv_fan_speed) == 3) spd = 0xC0;

          uint8_t csum = (uint8_t)(0x30+0xBC+0x00+0x48+0x00+0x01+
                                   0x00+0x00+0x11+mode_byte+spd);
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x11,mode_byte,spd,
                           0x00,0x00,0x00,0x00,0x00,csum,0x0D,0x0D};
          id(erv_last_cmd_at) = millis();
          id(uart_bus).write_array(pkt, 21);
          ESP_LOGI("erv", "팬 ON: mode=0x%02X spd=0x%02X csum=0x%02X",
                    mode_byte, spd, csum);
          // UI 상태는 ACK(30.DC) 수신 후 uart debug 람다에서 publish_state

    on_turn_off:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;  // ACK 업데이트 중 재진입 방지
          if (id(airpurifier_linked).state) return;
          // Power=0x00 Mode=0x00 Speed=0x00 체크섬=0x35
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x00,0x00,0x00,
                           0x00,0x00,0x00,0x00,0x00,0x35,0x0D,0x0D};
          id(erv_last_cmd_at) = millis();
          id(uart_bus).write_array(pkt, 21);
          id(erv_fan_state) = false;
          ESP_LOGI("erv", "팬 OFF 명령 전송");
