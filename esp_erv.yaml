uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# 상태
# 약 AA 55 30 DC 00 48 00 01 00 00 11 01 40 17 00 00 00 00 BE 0D 0D
# 중 AA 55 30 DC 00 48 00 01 00 00 11 01 80 17 00 00 00 00 FE 0D 0D
# 강 AA 55 30 DC 00 48 00 01 00 00 11 01 C0 17 00 00 00 00 3E 0D 0D
# 꺼 AA 55 30 DC 00 48 00 01 00 00 00 01 00 17 00 00 00 00 6D 0D 0D
# 제어
# 약 AA 55 30 BC 00 01 00 48 00 00 11 01 40 17 00 00 00 00 9E 0D 0D
# 중 AA 55 30 BC 00 01 00 48 00 00 11 01 80 17 00 00 00 00 DE 0D 0D
# 강 AA 55 30 BC 00 01 00 48 00 00 11 01 C0 17 00 00 00 00 1E 0D 0D
# 꺼 AA 55 30 BC 00 01 00 48 00 00 00 01 00 17 00 00 00 00 4D 0D 0D
fan:
  - platform: uartex
    name: "Navien Ventilator"
    state: 
      data: [0x30, 0xd0, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x11]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x01, 0x40, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t speed = ((uint8_t)x) * 0x40;
      return {{0x30, 0xbc, 0x00, 0x01, 0x00, 0x48, 0x00, 0x00, 0x11, 0x01, speed, 0x17, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update: 
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 2h
