# =====================================================================
# ERV ESPHome - 코콤 월패드 프로토콜 기반
# =====================================================================
# 코콤 패킷 구조 (21 bytes):
#   [0~1]   AA 55          헤더
#   [2~3]   30 BC/DC       타입 (BC=Send/Broadcast, DC=ACK)
#   [4~5]   디바이스       (Send시 00.48=Fan / ACK/BC시 00.01=Wallpad)
#   [6~7]   00 48          룸+Fan식별 (항상 00.48로 Fan 구분)
#   [8~9]   00 00          커맨드
#   [10]    P0 Power       0x11=On / 0x00=Off
#   [11]    P1 Mode        0x01=전열 / 0x02=자동 / 0x03=바이패스 / 0x05=수면
#   [12]    P2 Speed       0x40=저 / 0x80=중 / 0xC0=고
#   [13]    P3 CO2 high    (항상 0x00)
#   [14]    P4 CO2 mid     (항상 0x0A)
#   [15]    P5 CO2 low     CO2 ppm = ((0x0A<<8)|bytes[15]) / 2.5  ← 실측 확인
#   [16]    P6 ErrorCode
#   [17]    P7 unused
#   [18]    Checksum       bytes[2]~[17] 합산 mod 256
#   [19~20] 0D 0D          푸터
# =====================================================================

uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "%s: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

          if (direction != uart::UART_DIRECTION_RX) return;

          // ── 공기청정기 연동 감지 (비코콤 RS485 패킷) ──
          for (int i = 0; i + 7 < (int)bytes.size(); i++) {
            if (bytes[i]   == 0x32 &&
                bytes[i+2] == 0x0E &&
                bytes[i+3] == 0xD0 &&
                bytes[i+5] == 0xB1) {
              id(airpurifier_linked).publish_state(bytes[i+7] == 0x01);
              break;
            }
          }

          // ── 코콤 Fan 패킷 파싱 (30.DC ACK + 30.BC 브로드캐스트) ──
          // Fan 패킷 식별: AA55 30.[BC/DC] xx.xx 00.48 00.00 ...
          // bytes[6]=0x00, bytes[7]=0x48 로 Fan 패킷 구분
          for (int i = 0; i + 18 < (int)bytes.size(); i++) {
            if (bytes[i]   != 0xAA || bytes[i+1] != 0x55) continue;
            if (bytes[i+2] != 0x30) continue;
            uint8_t pkt_type = bytes[i+3];
            if (pkt_type != 0xDC && pkt_type != 0xBC) continue;
            if (bytes[i+6] != 0x00 || bytes[i+7] != 0x48) continue;

            uint8_t power = bytes[i+10];
            uint8_t mode  = bytes[i+11];
            uint8_t speed = bytes[i+12];
            bool is_on    = (power & 0x01);
            // CO2: 실측상 bytes[14]<<8|bytes[15], 스케일 /2.5 (룸콘 대비 검증)
            uint16_t co2  = ((uint16_t)bytes[i+14] << 8) | bytes[i+15];

            if (pkt_type == 0xDC) {
              // ── ACK 처리 ──
              // Scan 조회(Command=0x3A) ACK는 상태 업데이트 스킵
              bool is_scan_ack = (bytes[i+8] == 0x00 && bytes[i+9] == 0x3A);
              if (is_scan_ack) {
                ESP_LOGI("uart_debug", "Scan ACK 수신 → 상태 업데이트 스킵");
                if (co2 > 400) id(erv_co2).publish_state((float)co2 / 2.5f);
                break;
              }

              if (id(erv_ack_consumed)) {
                ESP_LOGI("uart_debug", "추가 ACK 무시 (이미 처리됨)");
                break;
              }
              id(erv_ack_consumed) = true;

              ESP_LOGI("uart_debug", "ERV ACK power=0x%02X mode=0x%02X speed=0x%02X co2=%d on=%d",
                        power, mode, speed, co2, is_on);

              id(erv_fan_state) = is_on;
              id(erv_updating_from_ack) = true;

              id(erv_fan).state = is_on; id(erv_fan).publish_state();

              if (speed == 0x40) { id(erv_fan_speed) = 1; id(erv_speed_number).publish_state(1); }
              else if (speed == 0x80) { id(erv_fan_speed) = 2; id(erv_speed_number).publish_state(2); }
              else if (speed == 0xC0) { id(erv_fan_speed) = 3; id(erv_speed_number).publish_state(3); }

              if (is_on) {
                if      (mode == 0x01) id(erv_mode).publish_state("전열환기");
                else if (mode == 0x02) id(erv_mode).publish_state("자동");
                else if (mode == 0x03) id(erv_mode).publish_state("바이패스");
                else if (mode == 0x05) id(erv_mode).publish_state("수면");
              }

              if (co2 > 400) id(erv_co2).publish_state((float)co2 / 2.5f);

              id(erv_updating_from_ack) = false;

            } else {
              // ── 브로드캐스트(30.BC) 처리 ──
              // CO2 실시간 업데이트 (on/off 무관)
              if (co2 > 400) {
                id(erv_co2).publish_state((float)co2 / 2.5f);
              }

              // 재기동 감지: 켜져있어야 하는데 꺼짐 브로드캐스트 수신 → 재기동
              // erv_ack_consumed=false (명령 대기 중)이면 무시 (모드전환 후 ERV 자동 브로드캐스트)
              bool cooldown_ok = (millis() - id(erv_last_restart_at) > 10000);
              bool scan_cooldown = (millis() - id(erv_scan_sent_ms)) > 2000;
              if (id(erv_fan_state) && !is_on && cooldown_ok
                  && id(erv_ack_consumed) && !id(airpurifier_linked).state
                  && scan_cooldown) {
                ESP_LOGI("erv", "ERV 꺼짐 감지(브로드캐스트) → 재기동");
                id(erv_last_restart_at) = millis();
                std::string mode_str = id(erv_mode).current_option();
                uint8_t mode_byte = 0x01;
                if (mode_str == "바이패스") mode_byte = 0x03;
                else if (mode_str == "자동") mode_byte = 0x02;
                else if (mode_str == "수면") mode_byte = 0x05;
                uint8_t spd = 0x40;
                if (id(erv_fan_speed) == 2) spd = 0x80;
                else if (id(erv_fan_speed) == 3) spd = 0xC0;
                uint8_t csum = (uint8_t)(0x30+0xBC+0x00+0x48+0x00+0x01+
                                         0x00+0x00+0x11+mode_byte+spd);
                uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                                 0x00,0x00,0x11,mode_byte,spd,
                                 0x00,0x00,0x00,0x00,0x00,csum,0x0D,0x0D};
                id(erv_ack_consumed) = false;
                id(uart_bus).write_array(pkt, 21);
              }
            }
            break;
          }

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]

uartex:
  rx_timeout: 200ms
  tx_delay: 300ms
  tx_timeout: 1000ms
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG

globals:
  - id: erv_fan_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: erv_fan_speed
    type: int
    restore_value: false
    initial_value: '1'
  - id: erv_ack_consumed
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: erv_updating_from_ack
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: erv_last_restart_at
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: erv_scan_sent_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'  # Scan 전송 시각, 2초간 재기동 억제용

binary_sensor:
  - platform: template
    name: "공기청정기 연동"
    id: airpurifier_linked
    device_class: running

sensor:
  - platform: template
    name: "ERV CO2"
    id: erv_co2
    icon: "mdi:molecule-co2"
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    state_class: measurement
    device_class: carbon_dioxide
    force_update: true

# =====================================================================
# Select - 모드 선택
# =====================================================================
select:
  - platform: template
    name: "ERV 모드"
    id: erv_mode
    icon: "mdi:air-filter"
    optimistic: true
    options:
      - "전열환기"
      - "바이패스"
      - "자동"
      - "수면"
    initial_option: "전열환기"
    set_action:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;
          if (!id(erv_fan_state)) return;
          if (id(airpurifier_linked).state) return;

          uint8_t mode_byte = 0x01;
          if (x == "바이패스") mode_byte = 0x03;
          else if (x == "자동") mode_byte = 0x02;
          else if (x == "수면") mode_byte = 0x05;

          uint8_t spd = 0x40;
          if (id(erv_fan_speed) == 2) spd = 0x80;
          else if (id(erv_fan_speed) == 3) spd = 0xC0;

          uint8_t csum = (uint8_t)(0x30+0xBC+0x00+0x48+0x00+0x01+
                                   0x00+0x00+0x11+mode_byte+spd);
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x11,mode_byte,spd,
                           0x00,0x00,0x00,0x00,0x00,csum,0x0D,0x0D};
          id(erv_ack_consumed) = false;
          id(uart_bus).write_array(pkt, 21);
          ESP_LOGI("erv", "모드변경: 0x%02X spd=0x%02X csum=0x%02X", mode_byte, spd, csum);

# =====================================================================
# Number - 속도 (1=저 / 2=중 / 3=고)
# =====================================================================
number:
  - platform: template
    name: "ERV 속도"
    id: erv_speed_number
    icon: "mdi:fan-speed-1"
    min_value: 1
    max_value: 3
    step: 1
    optimistic: true
    initial_value: 1
    set_action:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;
          if (!id(erv_fan_state)) return;
          if (id(airpurifier_linked).state) return;

          id(erv_fan_speed) = (int)x;

          std::string mode_str = id(erv_mode).current_option();
          uint8_t mode_byte = 0x01;
          if (mode_str == "바이패스") mode_byte = 0x03;
          else if (mode_str == "자동") mode_byte = 0x02;
          else if (mode_str == "수면") mode_byte = 0x05;

          uint8_t spd = 0x40;
          if ((int)x == 2) spd = 0x80;
          else if ((int)x == 3) spd = 0xC0;

          uint8_t csum = (uint8_t)(0x30+0xBC+0x00+0x48+0x00+0x01+
                                   0x00+0x00+0x11+mode_byte+spd);
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x11,mode_byte,spd,
                           0x00,0x00,0x00,0x00,0x00,csum,0x0D,0x0D};
          id(erv_ack_consumed) = false;
          id(uart_bus).write_array(pkt, 21);
          ESP_LOGI("erv", "속도변경: %d spd=0x%02X csum=0x%02X", (int)x, spd, csum);

# =====================================================================
# Fan - ERV 팬 ON/OFF
# =====================================================================
fan:
  - platform: template
    name: "ERV 팬"
    id: erv_fan

    on_turn_on:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;
          if (id(airpurifier_linked).state) {
            ESP_LOGI("erv", "공기청정기 연동 중 - ON 차단");
            id(erv_fan).state = false; id(erv_fan).publish_state();
            return;
          }

          std::string mode_str = id(erv_mode).current_option();
          uint8_t mode_byte = 0x01;
          if (mode_str == "바이패스") mode_byte = 0x03;
          else if (mode_str == "자동") mode_byte = 0x02;
          else if (mode_str == "수면") mode_byte = 0x05;

          uint8_t spd = 0x40;
          if (id(erv_fan_speed) == 2) spd = 0x80;
          else if (id(erv_fan_speed) == 3) spd = 0xC0;

          uint8_t csum = (uint8_t)(0x30+0xBC+0x00+0x48+0x00+0x01+
                                   0x00+0x00+0x11+mode_byte+spd);
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x11,mode_byte,spd,
                           0x00,0x00,0x00,0x00,0x00,csum,0x0D,0x0D};
          id(erv_ack_consumed) = false;
          id(uart_bus).write_array(pkt, 21);
          ESP_LOGI("erv", "팬 ON: mode=0x%02X spd=0x%02X csum=0x%02X",
                    mode_byte, spd, csum);

    on_turn_off:
      - lambda: |-
          if (id(erv_updating_from_ack)) return;
          if (id(airpurifier_linked).state) return;
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x00,0x00,0x00,0x00,
                           0x00,0x00,0x00,0x00,0x00,0x35,0x0D,0x0D};
          id(erv_ack_consumed) = false;
          id(uart_bus).write_array(pkt, 21);
          id(erv_fan_state) = false;
          ESP_LOGI("erv", "팬 OFF 명령 전송");

# =====================================================================
# Interval - 10초마다 Scan 조회 (CO2 갱신)
# Command=0x3A → ERV가 현재 상태+CO2로 30.BC 브로드캐스트 응답
# Scan ACK(Command=0x3A)는 파서에서 상태 업데이트 스킵 처리됨
# =====================================================================
interval:
  - interval: 10s
    then:
      - lambda: |-
          // 항상 조회 (켜짐/꺼짐 무관) → 30.BC로 CO2 갱신
          uint8_t pkt[] = {0xAA,0x55,0x30,0xBC,0x00,0x48,0x00,0x01,
                           0x00,0x3A,0x00,0x00,0x00,0x00,0x00,0x00,
                           0x00,0x00,0x6F,0x0D,0x0D};
          id(erv_scan_sent_ms) = millis();  // Scan 시각 저장 → 2초간 재기동 억제
          id(uart_bus).write_array(pkt, 21);
          ESP_LOGI("erv", "CO2 갱신 조회 (Scan)");
