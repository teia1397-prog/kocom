uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# python kocom.py 소스 분석 결과 (확정)
#
# send() 함수:
#   payload = type(30b) + seq(c) + 00 + dest + src + cmd + value
#   dest = '4800' (fan device 0x48, room 0x00)
#   src  = '0100' (wallpad)
#   cmd  = '00'   (state)
#
# TX 패킷 (AA55 헤더, 체크섬, 0D0D 제외):
#   30 BC 00 48 00 01 00 00 [value 8bytes]
#
# value 구조 (fan_parse / mqtt_on_message 기준):
#   ON+약: 11 01 40 00 00 00 00 00
#   ON+중: 11 01 80 00 00 00 00 00
#   ON+강: 11 01 C0 00 00 00 00 00
#   OFF  : 00 00 00 00 00 00 00 00
#
# RX 패킷 (AA55 헤더 제외):
#   30 DC 00 48 00 01 00 00 [value 8bytes]
#   offset 8  = value[0]: 0x11=ON / 0x00=OFF
#   offset 10 = value[2]: 0x40=약 / 0x80=중 / 0xC0=강
# ═══════════════════════════════════════════════════════════════

fan:
  - platform: uartex
    name: "ERV"
    id: erv_fan
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x11]
    state_off:
      offset: 8
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;
      if (check_value(10, 0x80, data, len)) return 2;
      if (check_value(10, 0xc0, data, len)) return 3;
      return 0;
    command_on:
      # TX: 30 BC 00 48 00 01 00 00 11 01 40 00 00 00 00 00 (약풍으로 켜기)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      # TX: 30 BC 00 48 00 01 00 00 00 00 00 00 00 00 00 00
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      // 1=약(0x40) / 2=중(0x80) / 3=강(0xC0)
      int idx = (int)x;
      uint8_t speed_map[] = {0x00, 0x40, 0x80, 0xc0};
      uint8_t spd = (idx >= 1 && idx <= 3) ? speed_map[idx] : 0x40;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, spd, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s

switch:
  # ─────────────────────────────────────────────
  # 모드 선택 - value[1](offset9) 이 모드값
  # python 소스: onoff_dic = {'on':'1101'} → value[0]=0x11, value[1]=0x01
  # 모드는 0x01 고정이고 ON/OFF만 value[0]으로 제어
  # 취침/바이패스 등은 value[1] 변경으로 추정
  # ─────────────────────────────────────────────
  - platform: uartex
    name: "ERV Mode Sleep"
    id: erv_mode_sleep
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x05]
    state_off:
      offset: 9
      data: [0x01]
    command_on:
      # value[1]=0x05 → 취침모드 (테스트로 확인됨 ✅)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Sleep ✅"
    on_turn_off:
      - logger.log: "Mode Sleep OFF -> Auto"

  - platform: uartex
    name: "ERV Mode Bypass"
    id: erv_mode_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x03]
    state_off:
      offset: 9
      data: [0x01]
    command_on:
      # value[1]=0x03 → 바이패스 (테스트로 확인됨 ✅)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x03, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x80, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Bypass ✅"
    on_turn_off:
      - logger.log: "Mode Bypass OFF -> Auto"
