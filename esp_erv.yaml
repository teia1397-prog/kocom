uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# switch로 검증된 패킷을 fan 플랫폼에 그대로 적용
#
# TX ON  (검증됨): 30 BC 00 48 00 01 00 00 11 02 00 00 40 00 00 00
# TX OFF (검증됨): 30 BC 00 48 00 01 00 00 00 00 00 00 00 00 00 00
# RX state       : 30 DC 00 48 00 ...
#   offset 8  = 모드  : 0x11=ON
#   offset 9  = 풍량  : 0x01=1단 / 0x02=2단 / 0x03=3단 (switch 테스트로 확인됨)
#   offset 12 = 전원  : 0x40=ON / 0x00=OFF
# ═══════════════════════════════════════════════════════════════

fan:
  - platform: uartex
    name: "ERV"
    id: erv_fan
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 12
      data: [0x40]
    state_off:
      offset: 12
      data: [0x00]
    state_speed: !lambda |-
      if (check_value(9, 0x01, data, len)) return 1;
      if (check_value(9, 0x02, data, len)) return 2;
      if (check_value(9, 0x03, data, len)) return 3;
      return 0;
    command_on:
      # switch에서 검증된 패킷 그대로 사용 (전열모드 0x11, 풍량 2단 0x02)
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      # switch에서 검증된 패킷 그대로 사용
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      uint8_t spd = (uint8_t)x;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, spd, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s
