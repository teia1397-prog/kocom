uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# 패킷 구조 (models.py 기반 확정)
# offset 8: 상위nibble=전원(0x1X=ON / 0x0X=OFF) + 하위nibble=모드
#   0x12 = ON + auto(자동) ✅
#   0x11 = ON + ventilation(환기)
#   0x13 = ON + bypass(바이패스)
#   0x15 = ON + sleep(취침)
#   0x18 = ON + air purification(공기청정)
# offset 10: 풍량
#   0x40 = 약(low) / 0x80 = 중(medium) / 0xC0 = 강(high)
# ═══════════════════════════════════════════════════════════════

fan:
  # ─────────────────────────────────────────────────────────────
  # 전열교환기
  # HA fan 카드에서 강/중/약/꺼짐 버튼으로 자동 표시됨
  # speed_count: 3 → HA가 자동으로 33%/66%/100% 슬라이더 3단계로 나눔
  # ─────────────────────────────────────────────────────────────
  - platform: uartex
    name: "전열교환기"
    id: erv_fan
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x10]
      mask: [0xf0]
    state_off:
      offset: 8
      data: [0x00]
      mask: [0xf0]
    state_speed: !lambda |-
      if (check_value(10, 0x40, data, len)) return 1;  // 약
      if (check_value(10, 0x80, data, len)) return 2;  // 중
      if (check_value(10, 0xc0, data, len)) return 3;  // 강
      return 0;
    command_on:
      # 자동모드(0x12) + 중(0x80) 기본값으로 켜기
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x12, 0x01, 0x80, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x00, 0x17, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_speed: !lambda |-
      // 1=약(0x40) / 2=중(0x80) / 3=강(0xC0)
      uint8_t speed_map[] = {0x00, 0x40, 0x80, 0xc0};
      uint8_t spd = (x >= 1 && x <= 3) ? speed_map[x] : 0x80;
      return {{0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x12, 0x01, spd, 0x17, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
    command_update:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    update_interval: 30s
