uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0x0D, 0x0D]
    sequence:
      - lambda: |-
          ESP_LOGI("uart_debug", "Direction: %s, Bytes: %s", 
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

# ═══════════════════════════════════════════════
# raw_uart: 월패드 RX 패킷 캡처용
# uartex 헤더 필터 없이 모든 raw 패킷을 로그에 출력
# 월패드에서 버튼 누를 때 여기서 패킷 캡처 가능
# ═══════════════════════════════════════════════

external_components:
  - source:
      type: git
      url: https://github.com/eigger/espcomponents
      ref: master
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 100ms
  tx_timeout: 1000ms
  tx_retry_cnt: 1
  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]
  rx_checksum: add_no_header
  tx_checksum: add_no_header
  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

logger:
  level: DEBUG
  logs:
    uart_debug: DEBUG
    uartex: DEBUG

# ═══════════════════════════════════════════════════════════════
# 실제 테스트 결과 기반 매핑 (스위치 순서로 확인)
#
# offset 9 = 모드 (풍량 아님!):
#   0x01 → 바이패스
#   0x02 → 자동
#   0x03 → 바이패스 (동일?)
#
# offset 8 = 아직 불명확
#   0x12 → 자동 동작
#   0x11 → 무반응 (단독으로는 안됨)
#
# 결론: offset 9가 실제 모드 바이트
#       풍량은 다른 offset에 있을 가능성 높음
# ═══════════════════════════════════════════════════════════════

switch:
  # ─────────────────────────────
  # ✅ 검증된 동작들
  # ─────────────────────────────

  - platform: uartex
    name: "ERV Power"
    id: erv_power
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 12
      data: [0x40]
    state_off:
      offset: 12
      data: [0x00]
    command_on:
      # offset9=0x02(자동) ✅ 전원켜짐 확인
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "ERV Power ON"
    on_turn_off:
      - logger.log: "ERV Power OFF"

  - platform: uartex
    name: "ERV Mode Auto"
    id: erv_mode_auto
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x02]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      # offset9=0x02 → 자동모드 ✅
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Auto ✅"

  - platform: uartex
    name: "ERV Mode Bypass"
    id: erv_mode_bypass
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x01]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      # offset9=0x01 → 바이패스 ✅
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x01, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Mode Bypass ✅"

  # ─────────────────────────────
  # 🔍 풍량 탐색용 (offset 8 상위/하위 nibble 조합)
  # 월패드에서 풍량 버튼 누를 때 RX 로그와 비교 필요
  # ─────────────────────────────

  - platform: uartex
    name: "ERV Probe 8 0x21"
    id: erv_probe_8_21
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x21]
    state_off:
      offset: 8
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x21, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe offset8=0x21"

  - platform: uartex
    name: "ERV Probe 8 0x31"
    id: erv_probe_8_31
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 8
      data: [0x31]
    state_off:
      offset: 8
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x31, 0x02, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe offset8=0x31"

  - platform: uartex
    name: "ERV Probe 9 0x04"
    id: erv_probe_9_04
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x04]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x04, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe offset9=0x04"

  - platform: uartex
    name: "ERV Probe 9 0x05"
    id: erv_probe_9_05
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x05]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x05, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe offset9=0x05"

  - platform: uartex
    name: "ERV Probe 9 0x08"
    id: erv_probe_9_08
    state:
      data: [0x30, 0xdc, 0x00, 0x48, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
    state_on:
      offset: 9
      data: [0x08]
    state_off:
      offset: 9
      data: [0x00]
    command_on:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x11, 0x08, 0x00, 0x00, 0x40, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    command_off:
      data: [0x30, 0xbc, 0x00, 0x48, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]
    on_turn_on:
      - logger.log: "Probe offset9=0x08"
