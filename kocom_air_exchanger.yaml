esphome:
  name: airpass-sniffer
  
m5stack_atoms3:

logger:
  level: DEBUG

uart:
  id: rs485_uart
  tx_pin: GPIO2
  rx_pin: GPIO1
  baud_rate: 9600  # 보통 9600, 안되면 4800, 19200 시도
  data_bits: 8
  parity: NONE
  stop_bits: 1
  debug:
    direction: BOTH
    dummy_receiver: true
    after:
      timeout: 100ms
    sequence:
      - lambda: UARTDebug::log_hex(direction, bytes, ',');
