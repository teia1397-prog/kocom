logger:
  level: DEBUG

uart:
  id: uart_bus
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2  # 문서 규격에 따라 2로 설정
  rx_pin: GPIO01
  tx_pin: GPIO02
  debug:
    direction: BOTH
    dummy_receiver: true
    sequence:
      - lambda: |-
          ESP_LOGI("uart", "%s: %s",
            direction == uart::UART_DIRECTION_RX ? "RX" : "TX",
            format_hex_pretty(bytes).c_str());

switch:
  - platform: template
    name: "Samsung ERV Power"
    id: erv_power
    icon: mdi:power
    optimistic: true
    # 전원 ON: 로그에서 확인된 실제 61바이트 데이터 (8F CC 34로 끝남)
    turn_on_action:
      - uart.write: [
          0x32, 0x00, 0x3B, 0x30, 0x01, 0x00, 0xB3, 0x01, 0xFF, 0xC0, 
          0x14, 0x1C, 0x0D, 0x40, 0x03, 0x00, 0x40, 0x04, 0x01, 0x40, 
          0x08, 0xFF, 0x40, 0x27, 0x00, 0x02, 0x02, 0x00, 0x00, 0x42, 
          0x03, 0x7F, 0xFF, 0x40, 0xB7, 0xFF, 0x42, 0xD1, 0xFF, 0xFF, 
          0x42, 0xD2, 0xFF, 0xFF, 0x42, 0xD3, 0xFF, 0xFF, 0x42, 0x1B, 
          0x7F, 0xFF, 0x40, 0x3A, 0xFF, 0x41, 0x2D, 0xFF, 0x8F, 0xCC, 0x34
        ]
    # 전원 OFF: 로그에서 확인된 OFF 패킷 (14 5B 34로 끝남)
    turn_off_action:
      - uart.write: [
          0x32, 0x00, 0x3B, 0x30, 0x01, 0x00, 0xB3, 0x01, 0xFF, 0xC0,
          0x14, 0xC8, 0x0D, 0x40, 0x03, 0x00, 0x40, 0x04, 0x01, 0x40,
          0x08, 0xFF, 0x40, 0x27, 0x00, 0x02, 0x02, 0x00, 0x00, 0x42,
          0x03, 0x7F, 0xFF, 0x40, 0xB7, 0xFF, 0x42, 0xD1, 0xFF, 0xFF,
          0x42, 0xD2, 0xFF, 0xFF, 0x42, 0xD3, 0xFF, 0xFF, 0x42, 0x1B,
          0x7F, 0xFF, 0x40, 0x3A, 0xFF, 0x41, 0x2D, 0xFF, 0x14, 0x5B, 0x34
        ]

# 수신 데이터 처리 (주기적으로 버퍼 비우기)
interval:
  - interval: 1s
    then:
      - lambda: |-
          while (id(uart_bus).available()) {
            uint8_t b;
            id(uart_bus).read_byte(&b);
          }
